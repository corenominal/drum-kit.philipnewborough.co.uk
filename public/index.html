<script defer src="js/main.js?v=f23d4757"></script>

<!-- Service Worker registration -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(registration => {
                // When the page becomes visible again (e.g. PWA resumed from background),
                // check for a newer SW so updates aren't missed between sessions.
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible') {
                        registration.update();
                    }
                });
            });
        });
        // When a new SW takes control (after an update), reload to get fresh assets.
        // The firstSW guard prevents a reload on the very first install.
        const firstSW = !navigator.serviceWorker.controller;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!firstSW) {
                window.location.reload();
            }
        });
    }
</script>
</head>
<body class="purple">
    <div id="splash-modal">
        <div id="splash-content">
            <img src="img/bass.svg" alt="Bass drum" id="splash-drum">
            <h1>Welcome to<br>Oliver's Drum Kit</h1>
            <div id="splash-btn-wrapper"><button id="splash-btn">Let's Play!</button></div>
        </div>
    </div>
    <div id="drumkit" class="drumkit">
        <button class="instrument" data-instrument="crash"><img class="spin" src="img/crash.svg" alt="Crash cymbal" draggable="false"></button>
        <button class="instrument" data-instrument="tom"><img class="pulse" src="img/tom.svg" alt="Tom drum" draggable="false"></button>
        <button class="instrument" data-instrument="hihat"><img class="spin" src="img/hihat.svg" alt="Hi hat cymbal" draggable="false"></button>
        <button class="instrument" data-instrument="snare"><img class="pulse" src="img/snare.svg" alt="Snare drum" draggable="false"></button>
        <button class="instrument" data-instrument="bass"><img class="pulse" src="img/bass.svg" alt="Bass drum" draggable="false"></button>
        <button class="instrument" data-instrument="floortom"><img class="pulse" src="img/floortom.svg" alt="Floor tom drum" draggable="false"></button>
    </div>
    <div id="cache-version"></div>
    <script>
        const colors = ['#BD93F9','#FF79C6','#F1FA8C','#FFB86C','#50FA7B','#8BE9FD','#ffffff','#ff2d78'];
        const fireflyColors = ['#F1FA8C','#c8ffaa','#50FA7B','#FFB86C','#ffffc0','#aaffaa','#ffffff'];

        // Firefly effect while the welcome modal is visible
        function spawnFirefly() {
            const p = document.createElement('span');
            p.className = 'firefly';
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const angle = Math.random() * 2 * Math.PI;
            const dist = 30 + Math.random() * 70;
            const size = 4 + Math.random() * 4;
            const color = fireflyColors[Math.floor(Math.random() * fireflyColors.length)];
            const dur = (2 + Math.random() * 2.5).toFixed(2);
            p.style.cssText = `left:${x - size / 2}px;top:${y - size / 2}px;width:${size}px;height:${size}px;background:${color};`;
            p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
            p.style.setProperty('--ff-color', color);
            p.style.setProperty('--ff-dur', dur + 's');
            document.body.appendChild(p);
            p.addEventListener('animationend', () => p.remove(), { once: true });
        }

        let splashSparkleTimer;
        function scheduleSplashSparkle() {
            splashSparkleTimer = setTimeout(function () {
                spawnFirefly();
                scheduleSplashSparkle();
            }, 200 + Math.random() * 400);
        }
        scheduleSplashSparkle();

        document.getElementById('splash-btn').addEventListener('click', function () {
            clearTimeout(splashSparkleTimer);
            if (window.playSplashSolo) window.playSplashSolo();
            const modal = document.getElementById('splash-modal');
            const content = document.getElementById('splash-content');
            modal.classList.add('exploding');
            // Burst particles from button centre
            const btn = document.getElementById('splash-btn');
            const r = btn.getBoundingClientRect();
            const cx = r.left + r.width / 2;
            const cy = r.top + r.height / 2;
            for (let i = 0; i < 28; i++) {
                const p = document.createElement('span');
                p.className = 'sparkle';
                const angle = (i / 28) * 2 * Math.PI;
                const dist = 80 + Math.random() * 180;
                p.style.cssText = `left:${cx - 14}px;top:${cy - 14}px;background:${colors[i % colors.length]};width:${10 + Math.random() * 20}px;height:${10 + Math.random() * 20}px;`;
                p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                document.body.appendChild(p);
                p.addEventListener('animationend', () => p.remove(), { once: true });
            }
            content.addEventListener('animationend', function () {
                modal.style.display = 'none';
                // Resume fireflies in the background indefinitely
                function scheduleBackgroundFirefly() {
                    splashSparkleTimer = setTimeout(function () {
                        spawnFirefly();
                        scheduleBackgroundFirefly();
                    }, 300 + Math.random() * 600);
                }
                scheduleBackgroundFirefly();
            }, { once: true });
        });
    </script>
</body>
</html>
